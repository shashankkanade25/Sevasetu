<div class="sidebar-container">
  <!-- Logo Area -->
  <div class="logo-area">
    <div class="logo-icon">
      <img src="assets/logo-placeholder.svg" alt="SevaSetu Logo" class="logo-img" />
    </div>
    <span class="logo-text">Seva<span class="logo-highlight">Setu</span></span>
  </div>

  <!-- Navigation -->
  <nav class="nav-list">
    @for (item of navItems; track item.label) {
      @if (item.route) {
        <a
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active"
          [id]="'nav-' + item.label.toLowerCase().replace(' ', '-')"
        >
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      } @else {
        <a class="nav-item disabled" [id]="'nav-' + item.label.toLowerCase().replace(' ', '-')">
          <mat-icon class="nav-icon">{{ item.icon }}</mat-icon>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    }
  </nav>
</div>
