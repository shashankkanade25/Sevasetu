<header class="navbar" id="top-navbar">
  <!-- Left: Welcome Text -->
  <div class="navbar-left">
    <h1 class="welcome-title">Welcome, {{ userName }} 👋</h1>
    <p class="welcome-subtitle">This is your data-driven NGO dashboard for prioritizing and coordinating community needs.</p>
  </div>

  <!-- Right: Profile Area -->
  <div class="navbar-right">
    <button mat-button [matMenuTriggerFor]="profileMenu" class="profile-trigger" id="profile-dropdown">
      <span class="profile-name">{{ userName }}</span>
      <mat-icon class="dropdown-arrow">arrow_drop_down</mat-icon>
      <div class="avatar-circle">
        <mat-icon class="avatar-icon">person</mat-icon>
      </div>
    </button>
    <mat-menu #profileMenu="matMenu">
      <button mat-menu-item>
        <mat-icon>person</mat-icon>
        <span>Profile</span>
      </button>
      <button mat-menu-item>
        <mat-icon>settings</mat-icon>
        <span>Settings</span>
      </button>
      <button mat-menu-item>
        <mat-icon>logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</header>
